# ============================================================================
# ArgoCD Applications — YAS Platform
# Mỗi service = 2 Application (dev + staging)
# Dev:     values.yaml + values-dev.yaml     → namespace dev
# Staging: values.yaml + values-staging.yaml → namespace staging
# ============================================================================

# ── location ────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-dev-location
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/thannthai/yas-gitops
    targetRevision: HEAD
    path: charts/location
    helm:
      ignoreMissingValueFiles: true
      valueFiles:
        - values.yaml
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-staging-location
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/thannthai/yas-gitops
    targetRevision: HEAD
    path: charts/location
    helm:
      ignoreMissingValueFiles: true
      valueFiles:
        - values.yaml
        - values-staging.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
---
