backend:
  image:
    repository: thanhthai298/yas-media
    tag: main


  nameOverride: media
  fullnameOverride: media
  databaseName: media
  ingress:
    enabled: true
    className: ""
    annotations: {}
    host: api.yas.local.com
    path: /media
    pathType: Prefix
  extraVolumes:
    - name: media-application
      configMap:
        name: media-application-configmap
  extraVolumeMounts:
    - name: media-application
      mountPath: /opt/yas/media
  extraApplicationConfigPaths:
    - /opt/yas/media/media-application.yaml

