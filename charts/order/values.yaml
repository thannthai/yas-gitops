backend:
  image:
    repository: thanhthai298/yas-order
    tag: main


  nameOverride: order
  fullnameOverride: order
  databaseName: order
  ingress:
    enabled: true
    className: "nginx"
    annotations: {}
    host: api.yas.local.com
    path: /order
  pathType: Prefix

  extraVolumes:
    - name: order-application-config
      configMap:
        name: order-application-configmap
  extraVolumeMounts:
    - name: order-application-config
      mountPath: /opt/yas/order
  extraApplicationConfigPaths:
    - /opt/yas/order/order-application.yaml  